services:
  watermark-remover:
    build:
      context: .
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu124
    image: ghcr.io/m19921414377/watermark-remove:latest
    ports:
      - "7860:7860"
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
      - ./data/work:/data/work
      - model-cache:/cache
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all

volumes:
  model-cache:
